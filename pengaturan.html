<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Pengaturan - WBM NET</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo text-center p-3">
      <img src="icon-192.png" class="logo-img" width="70">
      <h4 class="mt-2 mb-0">WBM NET</h4>
      <small>ISP Billing</small>
    </div>

    <ul>
      <li><a href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a></li>
      <li><a href="pelanggan.html"><i class="bi bi-people-fill"></i> Pelanggan</a></li>
      <li><a href="invoice.html"><i class="bi bi-receipt"></i> Invoice</a></li>
      <li><a href="laporan.html"><i class="bi bi-bar-chart-fill"></i> Laporan</a></li>
      <li class="active"><a href="pengaturan.html"><i class="bi bi-gear-fill"></i> Pengaturan</a></li>
    </ul>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="topbar">
      <h4 class="mb-0">Pengaturan Sistem</h4>
      <small class="text-muted">Konfigurasi ISP Billing</small>
    </div>

    <!-- PROFIL ADMIN -->
    <div class="card p-3 mb-3">

      <h5>Profil Admin</h5>

      <input type="text" id="namaAdmin" class="form-control mb-2" placeholder="Nama Admin">

      <input type="text" id="namaISP" class="form-control mb-2" placeholder="Nama ISP">

      <button class="btn btn-primary" id="btnSimpanProfil">
        Simpan Profil
      </button>

    </div>

    <!-- TARIF -->
    <div class="card p-3 mb-3">

      <h5>Setting Tarif Default</h5>

      <input type="number" id="tarifDefault" class="form-control mb-2" placeholder="Tarif per bulan">

      <button class="btn btn-success" id="btnSimpanTarif">
        Simpan Tarif
      </button>

    </div>

    <!-- BACKUP -->
    <div class="card p-3 mb-3">

      <h5>Backup Data</h5>

      <button class="btn btn-dark" id="btnBackup">
        Download Backup JSON
      </button>

    </div>

    <!-- RESET -->
    <div class="card p-3">

      <h5>Reset Data</h5>

      <button class="btn btn-danger" id="btnReset">
        Hapus Semua Data
      </button>

    </div>

  </div>

</div>

<script type="module" src="pengaturan.js"></script>

</body>
</html>
