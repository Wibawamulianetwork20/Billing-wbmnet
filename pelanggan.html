<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">

  <!-- ANTI CACHE (PENTING UNTUK UPDATE FIREBASE HOSTING) -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Data Pelanggan - WBM NET</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- STYLE VERSIONED -->
  <link rel="stylesheet" href="style.css?v=1.0.0">

  <meta name="theme-color" content="#0d6efd">
</head>

<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo text-center p-3">
      <img src="icon-192.png" class="logo-img" width="70">
      <h4 class="mt-2 mb-0">WBM NET</h4>
      <small>ISP Billing</small>
    </div>

    <ul>
      <li>
        <a href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a>
      </li>

      <li class="active">
        <a href="pelanggan.html"><i class="bi bi-people-fill"></i> Pelanggan</a>
      </li>

      <li>
        <a href="invoice.html"><i class="bi bi-receipt"></i> Invoice</a>
      </li>

      <li>
        <a href="laporan.html"><i class="bi bi-bar-chart-fill"></i> Laporan</a>
      </li>

      <li>
        <a href="pengaturan.html"><i class="bi bi-gear-fill"></i> Pengaturan</a>
      </li>
    </ul>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center">

      <div>
        <h4 class="mb-0">Data Pelanggan</h4>
        <small class="text-muted">Manajemen ISP Realtime</small>
      </div>

      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTambah">
        + Tambah Pelanggan
      </button>

    </div>

    <!-- SEARCH -->
    <div class="mb-3 mt-3">
      <input type="text" id="search" class="form-control"
             placeholder="Cari nama pelanggan...">
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">

      <div class="table-responsive">

        <table class="table table-hover align-middle">

          <thead class="table-primary">
            <tr>
              <th>Nama</th>
              <th>HP</th>
              <th>Paket</th>
              <th>Harga</th>
              <th>Status</th>
              <th>Jatuh Tempo</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="tabelPelanggan">
            <!-- realtime Firestore -->
          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<!-- MODAL TAMBAH -->
<div class="modal fade" id="modalTambah">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Tambah Pelanggan</h5>
      </div>

      <div class="modal-body">

        <input type="text" id="nama" class="form-control mb-2" placeholder="Nama">
        <input type="text" id="hp" class="form-control mb-2" placeholder="No HP">
        <input type="text" id="paket" class="form-control mb-2" placeholder="Paket">
        <input type="number" id="harga" class="form-control mb-2" placeholder="Harga">
        <input type="date" id="jatuhTempo" class="form-control mb-2">

      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Tutup
        </button>

        <button class="btn btn-primary" id="btnSimpan">
          Simpan
        </button>

      </div>

    </div>

  </div>

</div>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- VERSIONED JS (ANTI CACHE) -->
<script type="module" src="pelanggan.js?v=1.0.0"></script>

</body>
</html>
