<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Data Pelanggan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
  <img src="icon-192.png" class="logo-img">
<h3>WBM NET</h3>
<p>Billing System</p>
</div>

<ul>

<li>
<a href="dashboard.html">
<i class="bi bi-grid-fill"></i>
Dashboard
</a>
</li>

<li class="active">
<a href="pelanggan.html">
<i class="bi bi-people-fill"></i>
Pelanggan
</a>
</li>

<li>
<a href="invoice.html">
<i class="bi bi-receipt"></i>
Invoice
</a>
</li>

<li>
<a href="laporan.html">
<i class="bi bi-bar-chart-fill"></i>
Laporan
</a>
</li>

<li>
<a href="pengaturan.html">
<i class="bi bi-gear-fill"></i>
Pengaturan
</a>
</li>

</ul>

</div>

<!-- CONTENT -->

<div class="content">

<div class="topbar">

<h4>Data Pelanggan</h4>

</div>

<div class="card p-3 mb-4">

<h5>Tambah Pelanggan</h5>

<input id="nama" class="form-control mb-2" placeholder="Nama">

<input id="hp" class="form-control mb-2" placeholder="No HP">

<input id="alamat" class="form-control mb-2" placeholder="Alamat">

<input id="paket" class="form-control mb-2" placeholder="Paket Internet">

<input id="harga" type="number" class="form-control mb-2" placeholder="Harga">

<input id="jatuhTempo" type="date" class="form-control mb-2">

<button id="btnSimpan" class="btn btn-primary">
<i class="bi bi-save"></i>
Simpan
</button>

</div>

<div class="card p-3">

<div class="row mb-3">

<div class="col-md-6">
<input
id="search"
class="form-control"
placeholder="Cari pelanggan...">
</div>

<div class="col-md-3">
<select
id="filterStatus"
class="form-select">

<option value="SEMUA">
Semua Status
</option>

<option value="LUNAS">
LUNAS
</option>

<option value="BELUM">
BELUM
</option>

</select>
</div>

<div class="col-md-3">
<select
id="sortBy"
class="form-select">

<option value="nama">
Urut Nama
</option>

<option value="harga">
Urut Harga
</option>

<option value="jatuhTempo">
Urut Jatuh Tempo
</option>

</select>
</div>

</div>

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>
<th>Nama</th>
<th>HP</th>
<th>Paket</th>
<th>Harga</th>
<th>Jatuh Tempo</th>
<th>Status</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

</div>

<!-- Modal Edit -->

<div class="modal fade" id="editModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Edit Pelanggan</h5>
</div>

<div class="modal-body">

<input id="editNama" class="form-control mb-2">

<input id="editHp" class="form-control mb-2">

<input id="editPaket" class="form-control mb-2">

<input id="editHarga" type="number" class="form-control mb-2">

<select id="editStatus" class="form-select">

<option value="BELUM">BELUM</option>

<option value="LUNAS">LUNAS</option>

</select>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">
Batal
</button>

<button
id="btnUpdate"
class="btn btn-primary">
Update
</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="pelanggan.js"></script>

</body>
</html>
