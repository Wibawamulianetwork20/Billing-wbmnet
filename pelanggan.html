<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pelanggan - PWA</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2196F3">
</head>
<body>
  <h1>Halo <span id="namaUser"></span></h1>
  <button id="btnLogout" type="button">Logout</button>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

  // === GANTI SESUAI PROJECT KAMU ===
  const firebaseConfig = {
    apiKey: "AIzaSyDbUE5grCTF86R4Dj7NE_i1Vcmzic67u2U",
  authDomain: "billing-wbm-net.firebaseapp.com",
  projectId: "billing-wbm-net",
  storageBucket: "billing-wbm-net.firebasestorage.app",
  messagingSenderId: "155140597764",
  appId: "1:155140597764:web:01318d797f15c85d62ad51"
  };

  const VAPID_KEY = 'BEnf38GQeMXYVx4-xTsKeWmqY--nhHX---KU9CKjZXUAQLEKilCEuGTj9lFcEt0O8yPrU9dvbleRhoXQMeND3Pg';
  // ==================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const messaging = getMessaging(app);

  // 1. Cek login + ambil FCM token
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('namaUser').textContent = user.displayName || user.email;
      console.log('User login:', user.uid);
      
      const perm = await Notification.requestPermission();
      
      if (perm === 'granted') {
        try {
          const token = await getToken(messaging, { vapidKey: VAPID_KEY });
          console.log('Token FCM:', token);
          
          await setDoc(doc(db, 'users', user.uid), { 
            fcmToken: token,
            updatedAt: new Date()
          }, { merge: true });
          
          console.log('Token tersimpan ke Firestore ✅');
        } catch (err) {
          console.error('Gagal ambil token:', err);
        }
      } else {
        console.warn('Izin notifikasi ditolak ❌');
      }
    } else {
      console.log('User logout');
      window.location.href = '/login.html';
    }
  });

  // 2. Tangkap notif saat PWA dibuka
  onMessage(messaging, (payload) => {
    alert(payload.notification.title + '\n' + payload.notification.body);
  });

  // 3. Tombol logout + hapus token FCM
  document.addEventListener('DOMContentLoaded', () => {
    const btnLogout = document.getElementById('btnLogout');
    
    btnLogout.addEventListener('click', async () => {
      const user = auth.currentUser;
      
      try {
        if (user) {
          await setDoc(doc(db, 'users', user.uid), { 
            fcmToken: deleteField() 
          }, { merge: true });
          console.log('Token FCM dihapus');
        }
        
        await signOut(auth);
        console.log('Logout berhasil');
      } catch (error) {
        console.error('Logout error:', error);
        alert('Gagal logout: ' + error.message);
      }
    });
  });
  </script>
</body>
</html>
