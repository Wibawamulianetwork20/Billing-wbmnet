<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Laporan - WBM NET</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo text-center p-3">
      <img src="icon-192.png" class="logo-img" width="70">
      <h4 class="mt-2 mb-0">WBM NET</h4>
      <small>ISP Billing</small>
    </div>

    <ul>
      <li><a href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a></li>
      <li><a href="pelanggan.html"><i class="bi bi-people-fill"></i> Pelanggan</a></li>
      <li><a href="invoice.html"><i class="bi bi-receipt"></i> Invoice</a></li>
      <li class="active"><a href="laporan.html"><i class="bi bi-bar-chart-fill"></i> Laporan</a></li>
      <li><a href="pengaturan.html"><i class="bi bi-gear-fill"></i> Pengaturan</a></li>
    </ul>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- TOP -->
    <div class="topbar">
      <h4 class="mb-0">Laporan ISP</h4>
      <small class="text-muted">Rekap keuangan & pelanggan</small>
    </div>

    <!-- FILTER -->
    <div class="card p-3 mb-3">

      <div class="row g-2">

        <div class="col-md-4">
          <label>Pilih Bulan</label>
          <input type="month" id="filterBulan" class="form-control">
        </div>

        <div class="col-md-4 d-flex align-items-end">
          <button class="btn btn-primary w-100" id="btnFilter">
            Filter Laporan
          </button>
        </div>

      </div>

    </div>

    <!-- STAT -->
    <div class="row g-3">

      <div class="col-md-4">
        <div class="card stat-card success p-3">
          <h6>Pendapatan</h6>
          <h3 id="totalPendapatan">Rp 0</h3>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card stat-card dark p-3">
          <h6>Pelanggan Aktif</h6>
          <h3 id="totalAktif">0</h3>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card stat-card danger p-3">
          <h6>Menunggak</h6>
          <h3 id="totalMenunggak">0</h3>
        </div>
      </div>

    </div>

    <!-- TABLE -->
    <div class="card mt-4">

      <div class="table-responsive">

        <table class="table table-hover">

          <thead>
            <tr>
              <th>Nama</th>
              <th>Paket</th>
              <th>Harga</th>
              <th>Status</th>
              <th>Periode</th>
            </tr>
          </thead>

          <tbody id="tabelLaporan"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script type="module" src="laporan.js"></script>

</body>
</html>
