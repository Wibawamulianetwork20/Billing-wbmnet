<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d6efd">
  <title>Laporan - Billing WBM NET</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script>document.write('<link rel="stylesheet" href="style.css?v=' + Date.now() + '">');</script>
</head>
<body>
<div class="d-flex" id="wrapper">
  <div id="overlay"></div>

  <nav class="sidebar text-white p-3">
    <button class="btn btn-sm btn-light w-100 d-md-none mb-3" id="closeSidebar"><i class="bi bi-x-lg me-1"></i> Tutup Menu</button>
    <div class="text-center mb-4">
      <script>document.write('<img src="icon-192.png?v=' + Date.now() + '" width="70" class="rounded-circle mb-2 shadow">');</script>
      <h5 class="mb-0 fw-bold">WBM NET</h5>
      <small class="opacity-75">ISP Billing</small>
    </div>
    <ul class="nav flex-column">
      <li><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-fill me-2"></i> Dashboard</a></li>
      <li><a class="nav-link" href="pelanggan.html"><i class="bi bi-people-fill me-2"></i> Pelanggan</a></li>
      <li><a class="nav-link" href="invoice.html"><i class="bi bi-receipt me-2"></i> Invoice</a></li>
      <li><a class="nav-link active" href="laporan.html"><i class="bi bi-bar-chart-fill me-2"></i> Laporan</a></li>
      <li><a class="nav-link" href="pengaturan.html"><i class="bi bi-gear-fill me-2"></i> Pengaturan</a></li>
      <li class="mt-4"><a class="nav-link text-danger bg-white bg-opacity-10" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
    </ul>
  </nav>

  <div class="content-wrapper flex-grow-1">
    <div class="topbar d-flex justify-content-between align-items-center p-3">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-primary d-md-none" id="toggleSidebar"><i class="bi bi-list"></i></button>
        <h4 class="mb-0 fw-bold">Laporan Keuangan</h4>
      </div>
      <span id="userRole" class="small text-muted">role: admin</span>
    </div>

    <div class="p-4 fade-in">
      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="card p-3 bg-success text-white">
            <h6 class="opacity-75">Pendapatan Bulan Ini</h6>
            <h2 class="fw-bold mb-0" id="pendapatanBulan">Rp 0</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-3 bg-danger text-white">
            <h6 class="opacity-75">Total Piutang</h6>
            <h2 class="fw-bold mb-0" id="totalPiutang">Rp 0</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-3 bg-primary text-white">
            <h6 class="opacity-75">Total Transaksi</h6>
            <h2 class="fw-bold mb-0" id="totalTransaksi">0</h2>
          </div>
        </div>
      </div>
      <div class="card p-4">
        <h5 class="fw-bold mb-3">Grafik Pendapatan</h5>
        <canvas id="chartPendapatan" height="80"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="laporan.js?v=1"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js?v='+Date.now());</script>
</body>
</html>
