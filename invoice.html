<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d6efd">
  <title>Invoice - Billing WBM NET</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script>document.write('<link rel="stylesheet" href="style.css?v=' + Date.now() + '">');</script>
</head>
<body>
<div class="d-flex" id="wrapper">
  <div id="overlay"></div>

  <nav class="sidebar text-white p-3">
    <button class="btn btn-sm btn-light w-100 d-md-none mb-3" id="closeSidebar"><i class="bi bi-x-lg me-1"></i> Tutup Menu</button>
    <div class="text-center mb-4">
      <script>document.write('<img src="icon-192.png?v=' + Date.now() + '" width="70" class="rounded-circle mb-2 shadow">');</script>
      <h5 class="mb-0 fw-bold">WBM NET</h5>
      <small class="opacity-75">ISP Billing</small>
    </div>
    <ul class="nav flex-column">
      <li><a class="nav-link active" href="/dashboard"><i class="bi bi-grid-fill me-2"></i> Dashboard</a></li>
      <li><a class="nav-link" href="/pelanggan"><i class="bi bi-people-fill me-2"></i> Pelanggan</a></li>
      <li><a class="nav-link" href="/invoice"><i class="bi bi-receipt me-2"></i> Invoice</a></li>
      <li><a class="nav-link" href="/laporan"><i class="bi bi-bar-chart-fill me-2"></i> Laporan</a></li>
      <li><a class="nav-link" href="/pengaturan"><i class="bi bi-gear-fill me-2"></i> Pengaturan</a></li>
      <li class="mt-4"><a class="nav-link text-danger bg-white bg-opacity-10" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
    </ul>
  </nav>

  <div class="content-wrapper flex-grow-1">
    <div class="topbar d-flex justify-content-between align-items-center p-3">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-primary d-md-none" id="toggleSidebar"><i class="bi bi-list"></i></button>
        <h4 class="mb-0 fw-bold">Invoice & Pembayaran</h4>
      </div>
      <span id="userRole" class="small text-muted">role: admin</span>
    </div>

    <div class="p-4 fade-in">
      <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold mb-0">Daftar Invoice</h5>
          <button class="btn btn-success rounded-pill" id="btnBuatInvoice"><i class="bi bi-plus-lg me-1"></i> Buat Invoice</button>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr><th>No Invoice</th><th>Pelanggan</th><th>Periode</th><th>Total</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody id="tabelInvoice">
              <tr><td colspan="6" class="text-center text-muted py-4">Loading data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="invoice.js?v=1"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js?v='+Date.now());</script>
</body>
</html>
