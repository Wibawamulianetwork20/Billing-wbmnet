<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">

  <!-- ANTI CACHE (PENTING UNTUK UPDATE HOSTING) -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Invoice - WBM NET</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=1.0.0">

  <meta name="theme-color" content="#0d6efd">
</head>

<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo text-center p-3">
      <img src="icon-192.png" class="logo-img" width="70">
      <h4 class="mt-2 mb-0">WBM NET</h4>
      <small>ISP Billing</small>
    </div>

    <ul>
      <li>
        <a href="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a>
      </li>

      <li>
        <a href="pelanggan.html"><i class="bi bi-people-fill"></i> Pelanggan</a>
      </li>

      <li class="active">
        <a href="invoice.html"><i class="bi bi-receipt"></i> Invoice</a>
      </li>

      <li>
        <a href="laporan.html"><i class="bi bi-bar-chart-fill"></i> Laporan</a>
      </li>

      <li>
        <a href="pengaturan.html"><i class="bi bi-gear-fill"></i> Pengaturan</a>
      </li>
    </ul>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- TOPBAR -->
    <div class="topbar">
      <h4 class="mb-0">Invoice Billing</h4>
      <small class="text-muted">Generate tagihan ISP realtime</small>
    </div>

    <!-- FORM -->
    <div class="card p-3 mt-3">

      <div class="row g-2">

        <div class="col-md-4">
          <label>Pilih Pelanggan</label>
          <select id="selectPelanggan" class="form-control"></select>
        </div>

        <div class="col-md-4">
          <label>Periode</label>
          <input type="month" id="periode" class="form-control">
        </div>

        <div class="col-md-4 d-flex align-items-end">
          <button class="btn btn-primary w-100" id="btnGenerate">
            Generate Invoice
          </button>
        </div>

      </div>

    </div>

    <!-- RESULT -->
    <div class="card mt-3 p-4 shadow-sm" id="invoiceBox" style="display:none;">

      <h5>Invoice Tagihan</h5>

      <hr>

      <p><b>Nama:</b> <span id="invNama"></span></p>
      <p><b>HP:</b> <span id="invHp"></span></p>
      <p><b>Paket:</b> <span id="invPaket"></span></p>
      <p><b>Periode:</b> <span id="invPeriode"></span></p>

      <hr>

      <h4>Total: <span id="invTotal"></span></h4>

      <div class="mt-3 d-flex gap-2">

        <button class="btn btn-success" id="btnWA">
          <i class="bi bi-whatsapp"></i> Kirim WhatsApp
        </button>

        <button class="btn btn-dark" onclick="window.print()">
          Print
        </button>

      </div>

    </div>

  </div>

</div>

<!-- SCRIPT VERSIONED (ANTI CACHE) -->
<script type="module" src="invoice.js?v=1.0.0"></script>

</body>
</html>
