<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0d6efd">
  <title>Login - Billing WBM NET</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- iOS support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WBM NET">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS custom + anti cache -->
  <script>
    document.write('<link rel="stylesheet" href="style.css?v=' + Date.now() + '">');
  </script>
</head>

<body class="bg-light">
  <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="text-center mb-4">
      <script>
        document.write('<img src="icon-192.png?v=' + Date.now() + '" width="90" height="90" alt="logo">');
      </script>
      <h3 class="mt-3 fw-bold text-primary">Billing WBM NET</h3>
      <p class="text-muted small">Sistem Billing ISP</p>
    </div>

    <div class="card shadow-sm p-3 w-100" style="max-width: 420px; border-radius: 16px;">
      <ul class="nav nav-pills nav-fill mb-3" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active rounded-pill" id="tabLogin" onclick="showLogin()">Login</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link rounded-pill" id="tabRegister" onclick="showRegister()">Register</button>
        </li>
      </ul>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">
        <button id="btnLogin" class="btn btn-primary w-100 rounded-pill fw-semibold">Masuk</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerForm" style="display:none;">
        <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email">
        <input type="password" id="regPassword" class="form-control mb-3" placeholder="Password">
        <button id="btnRegister" class="btn btn-success w-100 rounded-pill fw-semibold">Daftar</button>
      </div>

      <div id="errorMsg" class="text-danger text-center mt-2 small"></div>
    </div>
  </div>

  <!-- Firebase + Auth JS anti cache -->
  <script>
    const authScript = document.createElement('script');
    authScript.type = 'module';
    authScript.src = 'auth.js?v=' + Date.now();
    document.body.appendChild(authScript);
  </script>

  <!-- Toggle Login/Register -->
  <script>
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('tabRegister').classList.remove('active');
    }
    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('tabRegister').classList.add('active');
      document.getElementById('tabLogin').classList.remove('active');
    }
  </script>

  <!-- Service Worker Register -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=' + Date.now())
        .then(() => console.log('SW registered'))
        .catch(err => console.log('SW error', err));
    }
  </script>
</body>
</html>
