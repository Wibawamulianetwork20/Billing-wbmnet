<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Login Billing WBM NET</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS di-load pakai JS biar bisa kasih timestamp -->
    <link rel="stylesheet" href="style.css">

  <meta name="theme-color" content="#0d6efd">
</head>

<body class="bg-light">
  <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="text-center mb-4">
      <!-- Logo juga kasih timestamp -->
      <script>
        document.write('<img src="icon-192.png?v=' + Date.now() + '" width="90" height="90" alt="logo">');
      </script>
      <h3 class="mt-3">Billing WBM NET</h3>
      <p class="text-muted">Sistem Billing ISP</p>
    </div>

    <div class="card shadow-sm p-3" style="max-width: 420px; width: 100%;">
      <div class="card-body">
        <ul class="nav nav-pills mb-3 justify-content-center">
          <li class="nav-item">
            <button class="nav-link active" id="tabLogin" onclick="showLogin()">Login</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="tabRegister" onclick="showRegister()">Register</button>
          </li>
        </ul>

        <!-- LOGIN -->
        <div id="loginForm">
          <input type="email" id="email" class="form-control mb-2" placeholder="Email">
          <input type="password" id="password" class="form-control mb-3" placeholder="Password">
          <button id="btnLogin" class="btn btn-primary w-100">Login</button>
        </div>

        <!-- REGISTER -->
        <div id="registerForm" style="display:none;">
          <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email">
          <input type="password" id="regPassword" class="form-control mb-3" placeholder="Password">
          <button id="btnRegister" class="btn btn-success w-100">Register</button>
        </div>

        <div id="errorMsg" class="text-danger text-center mt-2 small"></div>
      </div>
    </div>
  </div>

  <!-- JS FIREBASE juga kasih timestamp -->
  <script>
    var s = document.createElement('script');
    s.type = 'module';
    s.src = 'auth.js?v=' + Date.now();
    document.body.appendChild(s);
  </script>

  <!-- UI TOGGLE -->
  <script>
    function showLogin() {
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("tabLogin").classList.add("active");
      document.getElementById("tabRegister").classList.remove("active");
    }
    function showRegister() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "block";
      document.getElementById("tabRegister").classList.add("active");
      document.getElementById("tabLogin").classList.remove("active");
    }
  </script>

  <!-- AUTO UPDATE SYSTEM -->
  <script>
    (async () => {
      try {
        const res = await fetch("version.json?ts=" + Date.now());
        const data = await res.json();
        const local = localStorage.getItem("app_version");
        if (local && local !== data.build) {
          localStorage.setItem("app_version", data.build);
          // Force reload beneran tanpa cache
          window.location.href = window.location.href + '?v=' + Date.now();
        } else {
          localStorage.setItem("app_version", data.build);
        }
      } catch (e) {
        console.log("version check off");
      }
    })();
  </script>
  <script>
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=' + Date.now())
  .then(() => console.log('SW registered'))
  .catch(err => console.log('SW error', err));
}
</script>
</body>
</html>
